<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sea Salt Spray - Gillzilla Bodyworks</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #181818 80%, #222 100%);
      color: #e0e0e0;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      margin: 0;
    }
    .product-detail {
      max-width: 480px;
      margin: 60px auto;
      background: rgba(34,34,34,0.95);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.22);
      padding: 40px 32px 32px 32px;
      text-align: center;
    }
    .product-detail img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.22);
    }
    .product-detail h2 {
      font-size: 2rem;
      margin-bottom: 16px;
      color: #7fff7f;
    }
    .product-detail p {
      font-size: 1.1rem;
      margin-bottom: 18px;
      color: #e0e0e0;
    }
    .combo-deals {
      margin-top: 24px;
      text-align: left;
      background: rgba(60,60,60,0.5);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .combo-deals h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
      color: #7fff7f;
    }
    .combo-deals ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    .combo-deals li {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #fff;
    }
    .add-to-cart {
      margin-top: 18px;
      padding: 12px 28px;
      font-size: 1rem;
      background: #4CAF50;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .add-to-cart:hover {
      background: #7fff7f;
      color: #181818;
    }
    .back-btn {
      margin-top: 24px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 8px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: inline-block;
    }
    .back-btn:hover {
      background: #4CAF50;
      color: #181818;
    }
    .arrow-btn {
      background: none;
      border: none;
      color: #7fff7f;
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.2s;
      margin: 0 8px;
    }
    .arrow-btn:hover {
      color: #4CAF50;
    }
  </style>
</head>
<body>
  <div class="product-detail">
    <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
      <button class="arrow-btn" onclick="showPrevImage()" aria-label="Previous photo">&#8592;</button>
      <img id="mainImage" src="images/sea-salt-spray.png" alt="Sea Salt Spray" />
      <button class="arrow-btn" onclick="showNextImage()" aria-label="Next photo">&#8594;</button>
    </div>
    <h2>Sea Salt Spray - $20</h2>
    <p>Adds volume and beachy texture with a light hold. Perfect for achieving that effortless, windswept look.</p>
    <div class="combo-deals">
      <h3>Combo Deals</h3>
      <ul>
        <li>Sea Salt Spray + Texture Powder - $35</li>
        <li>Sea Salt Spray + Hair Clay - $40</li>
      </ul>
    </div>
    <button class="add-to-cart" onclick="addToCart('Sea Salt Spray', 20)">Add to Cart</button>
    <br>
    <button class="back-btn" onclick="window.location.href='index.html'">&larr; Back to Home</button>
  </div>
  <script>
    // Image slider logic for before/after
    const images = [
      "images/sea-salt-spray.png",
      "images/sea-salt-spray-before.png",
      "images/sea-salt-spray-after.png"
    ];
    let currentImage = 0;
    function showPrevImage() {
      currentImage = (currentImage - 1 + images.length) % images.length;
      document.getElementById('mainImage').src = images[currentImage];
    }
    function showNextImage() {
      currentImage = (currentImage + 1) % images.length;
      document.getElementById('mainImage').src = images[currentImage];
    }
    function addToCart(productName, price) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const productIndex = cart.findIndex(item => item.productName === productName);
      if (productIndex !== -1) {
        cart[productIndex].quantity++;
      } else {
        cart.push({ productName, price, quantity: 1 });
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(productName + " added to cart!");
    }
  </script>
</body>
</html>
